<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KurirMap</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Roboto',sans-serif;background:#e8eaed;overflow:hidden;}

/* ── MAP FULLSCREEN ───────────────────────── */
#map{position:fixed;inset:0;z-index:0;}
.leaflet-control-zoom{border:none!important;box-shadow:0 1px 4px rgba(0,0,0,.3)!important;}
.leaflet-control-zoom a{border-radius:2px!important;border:none!important;color:#444!important;font-size:18px!important;line-height:26px!important;}

/* ── PANEL (Google Maps left sidebar) ────── */
#panel{
  position:fixed;top:0;left:0;bottom:0;
  width:408px;z-index:10;
  display:flex;flex-direction:column;
  pointer-events:none;
}

/* ── SEARCH CARD (top floating) ──────────── */
#searchCard{
  margin:10px 10px 0 10px;
  background:#fff;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.15);
  pointer-events:all;
  overflow:hidden;
  flex-shrink:0;
}

/* LOGO ROW */
.logo-row{
  display:flex;align-items:center;gap:0;
  padding:10px 14px 0 14px;
}
.logo-text{
  font-family:'Google Sans',sans-serif;font-weight:700;
  font-size:1.05rem;color:#1a73e8;letter-spacing:-.3px;
}
.logo-text span{color:#ea4335;}

/* ROUTE INPUTS */
.route-inputs{padding:8px 10px 8px 10px;display:flex;flex-direction:column;gap:0;}
.input-row{display:flex;align-items:center;gap:8px;padding:2px 0;}
.dot-line-wrap{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;width:20px;}
.route-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.route-dot-line{width:2px;height:18px;background:#dadce0;margin:1px 0;}
.route-input{
  flex:1;border:none;outline:none;
  font-family:'Roboto',sans-serif;font-size:.875rem;color:#202124;
  background:#f1f3f4;border-radius:8px;
  padding:9px 12px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:background .15s;
}
.route-input:hover{background:#e8eaed;}
.route-input.active{background:#e8f0fe;color:#1a73e8;}
.route-input.filled{background:#f1f3f4;color:#202124;}
.route-input-placeholder{color:#80868b;}
.input-action{flex-shrink:0;}
.icon-btn{
  width:32px;height:32px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  border-radius:50%;color:#5f6368;transition:background .15s;
}
.icon-btn:hover{background:#f1f3f4;}

/* ADD STOP ROW */
.add-stop-row{
  display:flex;align-items:center;gap:8px;
  padding:4px 10px 10px 38px;
}
.add-stop-btn{
  display:flex;align-items:center;gap:5px;
  background:transparent;border:none;
  color:#1a73e8;font-family:'Roboto',sans-serif;font-size:.8rem;font-weight:500;
  cursor:pointer;padding:4px 8px;border-radius:4px;
  transition:background .15s;
}
.add-stop-btn:hover{background:#e8f0fe;}

/* SEARCH AUTOCOMPLETE */
#autocompleteDropdown{
  display:none;border-top:1px solid #e8eaed;
  max-height:280px;overflow-y:auto;
}
#autocompleteDropdown.show{display:block;}
.ac-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;cursor:pointer;transition:background .12s;
}
.ac-item:hover{background:#f1f3f4;}
.ac-icon{
  width:36px;height:36px;border-radius:50%;
  background:#e8eaed;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#5f6368;
}
.ac-main{font-size:.875rem;color:#202124;font-weight:500;}
.ac-sub{font-size:.76rem;color:#5f6368;margin-top:1px;}
.ac-loading{display:none;padding:12px 16px;color:#5f6368;font-size:.82rem;align-items:center;gap:8px;}
.ac-loading.show{display:flex;}
.spinner{width:14px;height:14px;border:2px solid #dadce0;border-top-color:#1a73e8;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DIRECTIONS PANEL ────────────────────── */
#directionsPanel{
  margin:6px 10px 0 10px;
  background:#fff;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.15);
  pointer-events:all;
  overflow:hidden;
  display:none;
  flex-direction:column;
}
#directionsPanel.show{display:flex;}

/* TARIF BAR */
.tarif-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid #e8eaed;
  background:#f8f9fa;
}
.tarif-bar-label{font-size:.75rem;color:#5f6368;display:flex;align-items:center;gap:5px;}
.tarif-input-wrap{
  display:flex;align-items:center;gap:4px;
  background:#fff;border:1px solid #dadce0;border-radius:6px;
  padding:3px 8px;
}
.tarif-input-wrap span{font-size:.75rem;color:#5f6368;}
.tarif-input-wrap input{
  width:68px;border:none;outline:none;background:transparent;
  font-family:'Roboto',sans-serif;font-size:.82rem;color:#202124;
  text-align:right;padding:2px 0;
}

/* RESULT SUMMARY */
.result-summary{
  display:flex;align-items:center;
  padding:12px 16px;gap:0;
}
.res-item{flex:1;text-align:center;}
.res-item+.res-item{border-left:1px solid #e8eaed;}
.res-val{font-family:'Google Sans',sans-serif;font-size:1.35rem;font-weight:700;line-height:1.2;}
.res-val.blue{color:#1a73e8;}
.res-val.green{color:#137333;}
.res-lbl{font-size:.7rem;color:#5f6368;margin-top:2px;}

/* VIA LABEL */
.via-label{
  padding:6px 16px 10px;
  font-size:.76rem;color:#5f6368;
  display:flex;align-items:center;gap:6px;
}

/* ROUTE CALC BTN */
.btn-directions{
  margin:0 16px 12px;
  background:#1a73e8;color:#fff;border:none;border-radius:24px;
  padding:10px 20px;font-family:'Google Sans',sans-serif;font-weight:500;font-size:.875rem;
  cursor:pointer;transition:background .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.btn-directions:hover{background:#1557b0;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.btn-directions:disabled{background:#dadce0;color:#80868b;cursor:not-allowed;box-shadow:none;}

/* LEGS TABLE */
.legs-section{border-top:1px solid #e8eaed;}
.legs-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;cursor:pointer;user-select:none;
  font-size:.8rem;color:#1a73e8;font-weight:500;
}
.legs-toggle:hover{background:#f1f3f4;}
.legs-body{display:none;padding:0 0 4px;}
.legs-body.open{display:block;}
.leg-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;border-top:1px solid #f1f3f4;
}
.leg-idx{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;color:#fff;flex-shrink:0;
}
.leg-info{flex:1;min-width:0;}
.leg-route-text{font-size:.78rem;color:#5f6368;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leg-km-text{font-size:.82rem;font-weight:500;color:#202124;}
.leg-cost{font-size:.78rem;color:#137333;font-weight:500;margin-top:1px;}

/* ── GPS BUTTON (floating, bottom right like GMaps) */
#gpsBtn{
  position:fixed;right:16px;bottom:100px;z-index:10;
  width:40px;height:40px;border-radius:50%;
  background:#fff;border:none;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  color:#1a73e8;transition:box-shadow .15s;
}
#gpsBtn:hover{box-shadow:0 4px 10px rgba(0,0,0,.3);}

/* ── RESET BUTTON (floating) */
#resetBtn{
  position:fixed;right:16px;bottom:52px;z-index:10;
  background:#fff;border:1px solid #dadce0;border-radius:24px;
  padding:8px 16px;font-family:'Google Sans',sans-serif;font-size:.8rem;
  color:#5f6368;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
  display:flex;align-items:center;gap:6px;
  transition:box-shadow .15s,color .15s;
}
#resetBtn:hover{box-shadow:0 2px 8px rgba(0,0,0,.25);color:#202124;}

/* ── TOAST ────────────────────────────────── */
#toast{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:#323232;color:#fff;padding:10px 20px;border-radius:4px;
  font-size:.82rem;z-index:9999;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;}

/* ── MAP CLICK HINT ──────────────────────── */
#mapHint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.65);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:.82rem;z-index:5;display:none;pointer-events:none;
  backdrop-filter:blur(4px);
}

/* POPUP CUSTOM */
.leaflet-popup-content-wrapper{border-radius:8px!important;box-shadow:0 2px 10px rgba(0,0,0,.25)!important;font-family:'Roboto',sans-serif!important;font-size:.8rem!important;padding:0!important;}
.leaflet-popup-content{margin:10px 14px!important;}

@media(max-width:600px){
  #panel{width:100%;bottom:auto;}
  #directionsPanel{max-height:45vh;overflow-y:auto;}
  #gpsBtn,#resetBtn{display:none;}
}
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- MAP HINT -->
<div id="mapHint">Klik peta untuk menentukan lokasi</div>

<!-- PANEL -->
<div id="panel">

  <!-- SEARCH CARD -->
  <div id="searchCard">
    <div class="logo-row">
      <svg width="20" height="20" viewBox="0 0 40 30" fill="none" style="margin-right:6px">
        <rect x="1" y="7" width="25" height="15" rx="2.5" fill="#1a73e8"/>
        <path d="M26 11h7l4 6v5h-11V11z" fill="#1557b0"/>
        <circle cx="8" cy="24" r="3.2" fill="#202124"/>
        <circle cx="8" cy="24" r="1.4" fill="#e8eaed"/>
        <circle cx="30" cy="24" r="3.2" fill="#202124"/>
        <circle cx="30" cy="24" r="1.4" fill="#e8eaed"/>
      </svg>
      <span class="logo-text">Kurir<span>Map</span></span>
    </div>

    <!-- ROUTE INPUTS -->
    <div class="route-inputs" id="routeInputs"></div>

    <!-- ADD STOP -->
    <div class="add-stop-row">
      <button class="add-stop-btn" onclick="addStop()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Tambah tujuan
      </button>
    </div>

    <!-- AUTOCOMPLETE -->
    <div id="autocompleteDropdown">
      <div class="ac-loading" id="acLoading">
        <div class="spinner"></div> Mencari lokasi...
      </div>
    </div>
  </div>

  <!-- DIRECTIONS RESULT PANEL -->
  <div id="directionsPanel">
    <!-- TARIF -->
    <div class="tarif-bar">
      <div class="tarif-bar-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h4.5a1.5 1.5 0 010 3H10.5a1.5 1.5 0 000 3H15"/></svg>
        Tarif pengiriman
      </div>
      <div class="tarif-input-wrap">
        <span>Rp</span>
        <input type="number" id="tarifInput" value="3000" min="0" step="500" oninput="updateTarif()"/>
        <span>/km</span>
      </div>
    </div>

    <!-- RESULT SUMMARY -->
    <div class="result-summary">
      <div class="res-item">
        <div class="res-val blue" id="resKm">—</div>
        <div class="res-lbl">Total jarak</div>
      </div>
      <div class="res-item">
        <div class="res-val green" id="resBiaya">—</div>
        <div class="res-lbl">Estimasi biaya</div>
      </div>
    </div>

    <!-- VIA -->
    <div class="via-label" id="viaLabel">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6l6 6-6 6"/></svg>
      Via jalur terpendek
    </div>

    <!-- HITUNG BTN -->
    <button class="btn-directions" id="calcBtn" onclick="calculate()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Cari Rute &amp; Hitung Biaya
    </button>

    <!-- LEGS -->
    <div class="legs-section" id="legsSection" style="display:none">
      <div class="legs-toggle" onclick="toggleLegs()">
        <span id="legsToggleLabel">Detail per segmen</span>
        <svg id="legsChevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="legs-body" id="legsBody"></div>
    </div>
  </div>

</div>

<!-- FLOATING GPS -->
<button id="gpsBtn" title="Gunakan lokasi saya" onclick="useMyLocation()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/>
  </svg>
</button>

<!-- FLOATING RESET -->
<button id="resetBtn" onclick="resetAll()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 12a9 9 0 109-9H3"/><path d="M3 3v6h6"/></svg>
  Reset
</button>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ────────────────────────────────────────────────────
// CONSTANTS
// ────────────────────────────────────────────────────
const ROUTE_COLORS = ['#1a73e8','#ea4335','#34a853','#fbbc04','#9c27b0','#00bcd4'];
const STOP_COLORS  = ['#ea4335','#1a73e8','#34a853','#fbbc04','#9c27b0','#ff5722'];
const TARIF        = () => parseFloat(document.getElementById('tarifInput').value) || 3000;

// ────────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────────
let stops      = [];   // {lat,lng,address,marker}
let stopCnt    = 0;
let routeLayers= [];
let activeIdx  = null; // which stop is being edited
let sTimeout   = null;
let legsOpen   = false;

// ────────────────────────────────────────────────────
// MAP
// ────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([-6.2, 106.8], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

map.on('click', e => {
  if (activeIdx === null) return;
  const { lat, lng } = e.latlng;
  placeStop(activeIdx, lat, lng, `${lat.toFixed(5)}, ${lng.toFixed(5)}`);
  reverseGeocode(lat, lng, activeIdx);
  closeAutocomplete();
  document.getElementById('mapHint').style.display = 'none';
});

// ────────────────────────────────────────────────────
// MARKER
// ────────────────────────────────────────────────────
function makeIcon(i) {
  const c = STOP_COLORS[i % STOP_COLORS.length];
  const lbl = String.fromCharCode(65 + i);
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;width:30px;height:42px;">
      <svg viewBox="0 0 30 42" xmlns="http://www.w3.org/2000/svg" width="30" height="42">
        <path d="M15 0C6.7 0 0 6.7 0 15c0 10 15 27 15 27s15-17 15-27C30 6.7 23.3 0 15 0z" fill="${c}" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
        <circle cx="15" cy="15" r="8" fill="rgba(255,255,255,.9)"/>
        <text x="15" y="19" text-anchor="middle" font-size="9" font-weight="700" fill="${c}" font-family="Google Sans,sans-serif">${lbl}</text>
      </svg>
    </div>`,
    iconSize: [30, 42], iconAnchor: [15, 42]
  });
}

// ────────────────────────────────────────────────────
// STOP MANAGEMENT
// ────────────────────────────────────────────────────
function addStop() {
  stops.push({ lat: null, lng: null, address: null, marker: null });
  renderInputs();
  openInput(stops.length - 1);
  checkReady();
}

function removeStop(i) {
  if (stops.length <= 2) { showToast('Minimal 2 titik diperlukan'); return; }
  if (stops[i].marker) map.removeLayer(stops[i].marker);
  stops.splice(i, 1);
  stops.forEach((s, j) => { if (s.marker) s.marker.setIcon(makeIcon(j)); });
  clearRoutes();
  resetResult();
  renderInputs();
  checkReady();
}

function placeStop(i, lat, lng, label) {
  const s = stops[i];
  s.lat = lat; s.lng = lng; s.address = label;
  if (s.marker) map.removeLayer(s.marker);
  s.marker = L.marker([lat, lng], { icon: makeIcon(i), draggable: true })
    .addTo(map)
    .bindPopup(`<b>${stopLbl(i)}</b><br/><span style="color:#5f6368;font-size:.75rem">${label.substring(0, 55)}</span>`);
  s.marker.on('dragend', e => {
    const { lat, lng } = e.target.getLatLng();
    s.lat = lat; s.lng = lng;
    reverseGeocode(lat, lng, i);
    resetResult();
    checkReady();
  });
  renderInputs();
  checkReady();
  fitAll();
}

function stopLbl(i) {
  if (i === 0) return 'Lokasi asal';
  if (i === stops.length - 1 && stops.length === 2) return 'Tujuan';
  return `Tujuan ${i}`;
}

function fitAll() {
  const pts = stops.filter(s => s.lat).map(s => [s.lat, s.lng]);
  if (pts.length >= 2) map.fitBounds(pts, { padding: [80, 450] });
  else if (pts.length === 1) map.setView(pts[0], 15);
}

function clearRoutes() { routeLayers.forEach(l => map.removeLayer(l)); routeLayers = []; }
function checkReady() {
  const ok = stops.length >= 2 && stops.every(s => s.lat !== null);
  document.getElementById('calcBtn').disabled = !ok;
}

// ────────────────────────────────────────────────────
// RENDER INPUT ROWS
// ────────────────────────────────────────────────────
function renderInputs() {
  const wrap = document.getElementById('routeInputs');
  let html = '';
  stops.forEach((s, i) => {
    const c     = STOP_COLORS[i % STOP_COLORS.length];
    const isLast= i === stops.length - 1;
    const filled= !!s.address;
    const lbl   = filled ? s.address.split(',')[0].substring(0, 45) : stopLbl(i);
    const cls   = filled ? 'route-input filled' : 'route-input';
    const pClass= filled ? '' : 'route-input-placeholder';
    const canDel= stops.length > 2;

    html += `<div class="input-row">
      <div class="dot-line-wrap">
        ${i < stops.length - 1
          ? `<div class="route-dot" style="background:${c}"></div>
             <div class="route-dot-line"></div>`
          : `<!-- SVG pin for last stop -->
             <svg width="14" height="18" viewBox="0 0 14 18" fill="none">
               <path d="M7 0C3.1 0 0 3.1 0 7c0 5 7 11 7 11s7-6 7-11C14 3.1 10.9 0 7 0z" fill="${c}"/>
               <circle cx="7" cy="7" r="2.5" fill="rgba(255,255,255,.9)"/>
             </svg>`
        }
      </div>
      <div class="${cls} ${pClass}" onclick="openInput(${i})" title="${s.address||''}">
        ${lbl}
      </div>
      ${canDel ? `<button class="icon-btn" onclick="removeStop(${i})" title="Hapus titik">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>` : `<div style="width:32px"></div>`}
    </div>`;
  });
  wrap.innerHTML = html;
}

// ────────────────────────────────────────────────────
// ACTIVE INPUT / AUTOCOMPLETE
// ────────────────────────────────────────────────────
function openInput(i) {
  activeIdx = i;
  // Highlight
  document.querySelectorAll('.route-input').forEach((el, j) => {
    el.classList.toggle('active', j === i);
  });
  // Show autocomplete area with a real input
  const drop = document.getElementById('autocompleteDropdown');
  drop.classList.add('show');
  drop.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #e8eaed;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="liveInput" placeholder="Cari nama tempat atau alamat..."
        style="flex:1;border:none;outline:none;font-size:.875rem;font-family:'Roboto',sans-serif;color:#202124;"
        oninput="onType(this.value)" onkeydown="if(event.key==='Escape')closeAutocomplete()" autofocus/>
      <button onclick="closeAutocomplete()" style="background:none;border:none;cursor:pointer;color:#5f6368;display:flex;padding:2px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="ac-loading" id="acLoading" style="display:none;padding:12px 16px;"><div class="spinner"></div>&nbsp;Mencari...</div>
    <div id="acResults"></div>
    <div onclick="activateMapClick()" style="display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-top:1px solid #e8eaed;" onmouseover="this.style.background='#f1f3f4'" onmouseout="this.style.background=''">
      <div class="ac-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"><path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      </div>
      <div>
        <div style="font-size:.875rem;color:#1a73e8;font-weight:500;">Pilih dari peta</div>
        <div style="font-size:.76rem;color:#5f6368;">Klik langsung pada peta</div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('liveInput')?.focus(), 50);
}

function closeAutocomplete() {
  activeIdx = null;
  document.getElementById('autocompleteDropdown').classList.remove('show');
  document.getElementById('autocompleteDropdown').innerHTML = '';
  document.querySelectorAll('.route-input').forEach(el => el.classList.remove('active'));
}

function activateMapClick() {
  document.getElementById('mapHint').style.display = 'block';
  document.getElementById('autocompleteDropdown').classList.remove('show');
  showToast('Klik pada peta untuk menentukan lokasi');
}

// ────────────────────────────────────────────────────
// SEARCH / NOMINATIM
// ────────────────────────────────────────────────────
function onType(v) {
  clearTimeout(sTimeout);
  const res = document.getElementById('acResults');
  if (!res) return;
  if (v.length < 2) { res.innerHTML = ''; return; }
  sTimeout = setTimeout(() => fetchSug(v), 380);
}

async function fetchSug(q) {
  const loadEl = document.getElementById('acLoading');
  const resEl  = document.getElementById('acResults');
  if (!loadEl || !resEl) return;
  loadEl.style.display = 'flex';
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,
      { headers: { 'Accept-Language': 'id' } }
    );
    const data = await r.json();
    resEl.innerHTML = data.map(r => `
      <div class="ac-item" onclick="pickSug(${r.lat},${r.lon},'${esc(r.display_name)}')">
        <div class="ac-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2" stroke-linecap="round">
            <path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/>
          </svg>
        </div>
        <div>
          <div class="ac-main">${esc(r.name || r.display_name.split(',')[0])}</div>
          <div class="ac-sub">${esc(r.display_name)}</div>
        </div>
      </div>`).join('') || `<div style="padding:12px 16px;font-size:.82rem;color:#5f6368;">Lokasi tidak ditemukan</div>`;
  } catch { }
  if (loadEl) loadEl.style.display = 'none';
}

function pickSug(lat, lng, label) {
  if (activeIdx === null) return;
  placeStop(activeIdx, parseFloat(lat), parseFloat(lng), label);
  closeAutocomplete();
  document.getElementById('mapHint').style.display = 'none';
}

async function reverseGeocode(lat, lng, i) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
      { headers: { 'Accept-Language': 'id' } }
    );
    const d = await r.json();
    if (d.display_name && stops[i]) { stops[i].address = d.display_name; renderInputs(); }
  } catch { }
}

function useMyLocation() {
  if (!navigator.geolocation) { showToast('GPS tidak tersedia di browser ini'); return; }
  showToast('Mencari lokasi GPS...');
  navigator.geolocation.getCurrentPosition(p => {
    if (activeIdx === null) {
      // default: set first unfilled stop
      const fi = stops.findIndex(s => !s.lat);
      if (fi !== -1) activeIdx = fi; else activeIdx = 0;
    }
    const { latitude: lat, longitude: lng } = p.coords;
    placeStop(activeIdx, lat, lng, `Lokasi Saya`);
    reverseGeocode(lat, lng, activeIdx);
    map.setView([lat, lng], 15);
    closeAutocomplete();
  }, () => showToast('Tidak dapat mengakses GPS'));
}

function esc(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ────────────────────────────────────────────────────
// CALCULATE
// ────────────────────────────────────────────────────
async function calculate() {
  if (stops.length < 2 || !stops.every(s => s.lat)) return;
  const btn = document.getElementById('calcBtn');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="border-top-color:#fff;border-color:rgba(255,255,255,.3)"></div>&nbsp;Menghitung rute...`;
  clearRoutes();

  let totalKm = 0;
  const legs = [];
  try {
    for (let i = 0; i < stops.length - 1; i++) {
      const a = stops[i], b = stops[i + 1];
      const url = `https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      const d   = await res.json();
      if (d.code !== 'Ok' || !d.routes?.length) {
        showToast(`Rute ${String.fromCharCode(65+i)}→${String.fromCharCode(66+i)} tidak ditemukan`);
        return;
      }
      const route = d.routes[0];
      const km    = route.distance / 1000;
      totalKm    += km;
      const latlngs = route.geometry.coordinates.map(c => [c[1], c[0]]);

      // Blue main route line like Google Maps
      const shadow = L.polyline(latlngs, { color: '#fff', weight: 9, opacity: .6 }).addTo(map);
      const line   = L.polyline(latlngs, { color: ROUTE_COLORS[i % ROUTE_COLORS.length], weight: 6, opacity: .9 }).addTo(map);
      routeLayers.push(shadow, line);

      legs.push({
        from:  a.address || `Titik ${String.fromCharCode(65+i)}`,
        to:    b.address || `Titik ${String.fromCharCode(66+i)}`,
        km,
        color: ROUTE_COLORS[i % ROUTE_COLORS.length]
      });
    }

    const tarif  = TARIF();
    const biaya  = totalKm * tarif;
    const fmtRp  = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');

    document.getElementById('resKm').textContent    = totalKm.toFixed(1) + ' km';
    document.getElementById('resBiaya').textContent = fmtRp(biaya);

    // Via label
    const mid = stops[0].address ? stops[0].address.split(',')[0].substring(0, 22) : 'Asal';
    document.getElementById('viaLabel').innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6l6 6-6 6"/></svg>
      ${totalKm.toFixed(1)} km · Rp${Math.round(biaya).toLocaleString('id-ID')}`;

    // Legs
    if (legs.length > 1) {
      document.getElementById('legsBody').innerHTML = legs.map((l, i) => {
        const fa = l.from.split(',')[0].substring(0, 22);
        const fb = l.to.split(',')[0].substring(0, 22);
        return `<div class="leg-row">
          <div class="leg-idx" style="background:${l.color}">${String.fromCharCode(65+i)}</div>
          <div class="leg-info">
            <div class="leg-route-text">${fa} → ${fb}</div>
            <div style="display:flex;gap:12px;margin-top:2px;">
              <span class="leg-km-text">${l.km.toFixed(1)} km</span>
              <span class="leg-cost">${fmtRp(l.km * tarif)}</span>
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('legsSection').style.display = 'block';
    } else {
      document.getElementById('legsSection').style.display = 'none';
    }

    document.getElementById('directionsPanel').classList.add('show');

    // Fit with panel offset
    const bounds = routeLayers
      .filter(l => l.getBounds)
      .reduce((acc, l) => { try { return acc.extend(l.getBounds()); } catch { return acc; } }, routeLayers.find(l=>l.getBounds)?.getBounds());
    if (bounds) map.fitBounds(bounds, { paddingTopLeft: [420, 60], paddingBottomRight: [60, 60] });

  } catch (e) {
    showToast('Gagal mengambil data rute. Cek koneksi internet.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Cari Rute &amp; Hitung Biaya`;
    checkReady();
  }
}

// ────────────────────────────────────────────────────
// LEGS TOGGLE
// ────────────────────────────────────────────────────
function toggleLegs() {
  legsOpen = !legsOpen;
  document.getElementById('legsBody').classList.toggle('open', legsOpen);
  document.getElementById('legsChevron').style.transform = legsOpen ? 'rotate(180deg)' : '';
  document.getElementById('legsToggleLabel').textContent = legsOpen ? 'Sembunyikan detail' : 'Detail per segmen';
}

// ────────────────────────────────────────────────────
// TARIF
// ────────────────────────────────────────────────────
function updateTarif() {
  // Recalculate biaya if we already have a result
  const kmEl = document.getElementById('resKm');
  const km   = parseFloat(kmEl.textContent);
  if (!isNaN(km)) {
    const biaya = km * TARIF();
    document.getElementById('resBiaya').textContent = 'Rp ' + Math.round(biaya).toLocaleString('id-ID');
    document.getElementById('viaLabel').innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6l6 6-6 6"/></svg>
      ${km.toFixed(1)} km · Rp${Math.round(biaya).toLocaleString('id-ID')}`;
    // Update legs too
    document.querySelectorAll('.leg-cost').forEach((el, i) => {
      const kmLeg = parseFloat(document.querySelectorAll('.leg-km-text')[i]?.textContent);
      if (!isNaN(kmLeg)) el.textContent = 'Rp ' + Math.round(kmLeg * TARIF()).toLocaleString('id-ID');
    });
  }
}

// ────────────────────────────────────────────────────
// RESET
// ────────────────────────────────────────────────────
function resetResult() {
  document.getElementById('directionsPanel').classList.remove('show');
  document.getElementById('legsSection').style.display = 'none';
  document.getElementById('legsBody').classList.remove('open');
  legsOpen = false;
}

function resetAll() {
  stops.forEach(s => { if (s.marker) map.removeLayer(s.marker); });
  stops = [];
  clearRoutes();
  resetResult();
  closeAutocomplete();
  document.getElementById('mapHint').style.display = 'none';
  init();
  map.setView([-6.2, 106.8], 12);
}

// ────────────────────────────────────────────────────
// TOAST
// ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────
function init() {
  stops = [
    { lat: null, lng: null, address: null, marker: null },
    { lat: null, lng: null, address: null, marker: null },
  ];
  renderInputs();
  checkReady();
}

init();
</script>
</body>
</html>
