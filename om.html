<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3:42 Kalkulator Jarak & Ongkir Kurir</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:       #1a73e8;
      --blue-dark:  #1557b0;
      --blue-light: #e8f0fe;
      --blue-mid:   #4285f4;
      --red:        #ea4335;
      --green:      #25d366;
      --green-dark: #128c7e;
      --white:      #ffffff;
      --bg:         #f8f9fa;
      --border:     #e0e0e0;
      --text:       #202124;
      --text-sub:   #5f6368;
      --shadow-md:  0 4px 16px rgba(0,0,0,.13);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.16);
      --radius:     14px;
      --font:       'Plus Jakarta Sans', sans-serif;
      --sidebar-w:  390px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

    #app { display: flex; height: 100dvh; position: relative; }
    #map { flex: 1; height: 100%; z-index: 1; }

    /* ── SIDEBAR ── */
    #sidebar {
      position: absolute; top: 16px; left: 16px;
      width: var(--sidebar-w); max-height: calc(100dvh - 32px);
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); z-index: 1000;
      display: flex; flex-direction: column; overflow: hidden;
      transition: transform .3s ease;
    }
    .sidebar-header {
      padding: 16px 18px 13px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: var(--white); flex-shrink: 0;
    }
    .logo-icon {
      width: 36px; height: 36px; background: var(--blue);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sidebar-header h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .sidebar-header p  { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

    .sidebar-body { padding: 14px 14px 6px; overflow-y: auto; flex: 1; }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-label {
      font-size: 10.5px; font-weight: 700; color: var(--text-sub);
      letter-spacing: .07em; text-transform: uppercase; margin-bottom: 10px;
    }

    /* ── STOP ITEMS ── */
    .stops-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }

    .stop-item {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 7px 9px; transition: border-color .2s, box-shadow .2s; position: relative;
    }
    .stop-item:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,115,232,.1);
      background: var(--white);
    }

    .stop-pin {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 10px; font-weight: 700; color: var(--white);
    }
    .stop-pin.origin { background: var(--blue); }
    .stop-pin.stop   { background: var(--blue-mid); }
    .stop-pin.dest   { background: var(--red); }

    /* input wrapper — holds input + clear button */
    .ac-wrap { position: relative; flex: 1; min-width: 0; display: flex; align-items: center; }

    .stop-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: var(--font); font-size: 13px; color: var(--text);
      padding-right: 22px; /* room for clear btn */
      min-width: 0;
    }
    .stop-input::placeholder { color: #aaa; }

    /* ── CLEAR (×) BUTTON ── */
    .btn-clear {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; border-radius: 50%; border: none;
      background: #c5c5c5; color: #fff; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      padding: 0; flex-shrink: 0; transition: background .15s;
    }
    .btn-clear.show { display: flex; }
    .btn-clear:hover { background: #999; }

    /* autocomplete dropdown */
    .ac-list {
      position: absolute; top: calc(100% + 28px); left: -34px; right: -42px;
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      box-shadow: var(--shadow-md); z-index: 9999; max-height: 200px; overflow-y: auto; display: none;
    }
    .ac-list.open { display: block; }
    .ac-item {
      display: flex; align-items: flex-start; gap: 9px; padding: 9px 13px;
      cursor: pointer; font-size: 12.5px; color: var(--text);
      border-bottom: 1px solid var(--border); transition: background .12s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item:focus { background: var(--blue-light); outline: none; }
    .ac-icon { color: var(--text-sub); flex-shrink: 0; margin-top: 2px; }
    .ac-main { font-weight: 600; display: block; }
    .ac-sub  { font-size: 11px; color: var(--text-sub); display: block; }

    /* icon buttons (GPS / delete) */
    .btn-icon {
      width: 28px; height: 28px; border-radius: 7px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub); transition: background .15s, color .15s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--blue-light); color: var(--blue); }
    .btn-icon.danger:hover { background: #fce8e6; color: var(--red); }

    .stop-connector { display: flex; align-items: center; justify-content: center; height: 10px; padding-left: 13px; }

    /* ── ACTION BUTTONS ── */
    .btn-add {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px; border: 1.5px dashed var(--blue); background: var(--blue-light);
      color: var(--blue); border-radius: 10px; font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s, border-style .15s; margin-bottom: 12px;
    }
    .btn-add:hover { background: #d2e3fc; border-style: solid; }

    .btn-calc {
      width: 100%; padding: 12px; background: var(--blue); color: var(--white);
      border: none; border-radius: 10px; font-family: var(--font); font-size: 14px;
      font-weight: 700; cursor: pointer; transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;
    }
    .btn-calc:hover { background: var(--blue-dark); }
    .btn-calc:active { transform: scale(.98); }

    .btn-reset {
      width: 100%; padding: 9px; background: transparent; color: var(--text-sub);
      border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .15s, color .15s; margin-bottom: 6px;
    }
    .btn-reset:hover { background: var(--bg); color: var(--text); }

    /* ── RESULT CARD ── */
    #result-card {
      margin: 0 14px 10px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      border-radius: 12px; padding: 14px 16px; color: var(--white);
      display: none; flex-shrink: 0;
    }
    #result-card.visible { display: block; }
    .result-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .result-row + .result-row { margin-top: 11px; padding-top: 11px; border-top: 1px solid rgba(255,255,255,.2); }
    .result-label { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; opacity: .8; }
    .result-value { font-size: 20px; font-weight: 700; text-align: right; }
    .result-value.big { font-size: 22px; }
    .result-note { font-size: 10px; opacity: .7; text-align: right; margin-top: 2px; }

    /* ── WHATSAPP BUTTON ── */
    .btn-wa {
      display: none; width: calc(100% - 28px); margin: 0 14px 14px;
      padding: 12px; background: var(--green); color: var(--white);
      border: none; border-radius: 10px; font-family: var(--font);
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .2s, transform .1s;
      align-items: center; justify-content: center; gap: 8px; flex-shrink: 0;
    }
    .btn-wa.visible { display: flex; }
    .btn-wa:hover { background: var(--green-dark); }
    .btn-wa:active { transform: scale(.98); }

    /* WA modal CSS dihapus — nomor sudah hardcode, tidak perlu modal */

    /* ── LOADING / TOAST ── */
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,.55); z-index: 9998;
      align-items: center; justify-content: center;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #303134; color: var(--white);
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ── */
    #toggle-sidebar {
      display: none; position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%); z-index: 1001;
      background: var(--blue); color: var(--white); border: none;
      border-radius: 50px; padding: 12px 24px; font-family: var(--font);
      font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg); cursor: pointer;
      gap: 10px; align-items: center; white-space: nowrap;
      transition: padding .2s, background .2s;
    }
    @media (max-width: 600px) {
      :root { --sidebar-w: calc(100vw - 24px); }
      #sidebar {
        top: auto; bottom: 80px; left: 12px; right: 12px; width: auto;
        max-height: 70dvh; transform: translateY(calc(100% + 100px));
      }
      #sidebar.open { transform: translateY(0); }
      #toggle-sidebar { display: flex; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="1"/>
          <path d="M16 8h4l3 5v4h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div>
        <h1>Kalkulator Ongkir</h1>
        <p>Hitung jarak &amp; biaya pengiriman</p>
      </div>
    </div>

    <div class="sidebar-body" id="sidebar-body">
      <div class="section-label">Rute Pengiriman</div>
      <div class="stops-list" id="stops-list"></div>

      <button class="btn-add" onclick="addStop()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Tambah Lokasi
      </button>
      <button class="btn-calc" onclick="calculateRoute()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Hitung Rute &amp; Ongkir
      </button>
      <button class="btn-reset" onclick="resetAll()">Reset Semua</button>
    </div>

    <!-- Result card -->
    <div id="result-card">
      <div class="result-row">
        <div>
          <div class="result-label">Total Jarak</div>
          <div class="result-value" id="res-distance">—</div>
        </div>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </div>
      <div class="result-row">
        <div>
          <div class="result-label">Total Ongkir</div>
          <div class="result-value big" id="res-cost">—</div>
          <div class="result-note" id="res-note">—</div>
        </div>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9 12h6M12 9v6"/></svg>
      </div>
    </div>

    <!-- WhatsApp button (muncul setelah kalkulasi berhasil) -->
    <button class="btn-wa" id="btn-wa" onclick="openWaModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.115 1.527 5.843L.057 23.428a.75.75 0 0 0 .918.93l5.656-1.478A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.944 9.944 0 0 1-5.13-1.424l-.368-.217-3.792.991.996-3.7-.24-.382A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
      </svg>
      Kirim Order via WhatsApp
    </button>
  </div>

  <button id="toggle-sidebar" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    Buka Panel
  </button>
</div>

<!-- No WA modal needed — nomor sudah di-set di CONFIG.WA_NUMBER -->

<div id="loading-overlay"><div class="spinner"></div></div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ================================================================
   ⚙️  KONFIGURASI TARIF — UBAH DI SINI JIKA HARGA BERUBAH
================================================================ */
const CONFIG = {
  /**
   * Tarif biaya per kilometer (Rp)
   * Saat ini: Rp 3.000 / km
   * Ubah angka di bawah jika tarif berubah.
   * Contoh tarif baru Rp 3.500/km → tulis: 3500
   */
  RATE_PER_KM: 3000,

  /**
   * Biaya minimum (Rp).
   * Jika total ongkir lebih kecil dari nilai ini, nilai ini yang dipakai.
   * Set ke 0 untuk menonaktifkan biaya minimum.
   */
  MIN_COST: 5000,

  /**
   * Faktor koreksi jarak (pengali).
   * OSRM kadang menghitung jarak sedikit lebih pendek dari Google Maps
   * karena perbedaan data jalan & algoritma rute.
   * Nilai 1.05 = tambah 5% untuk kompensasi (mendekati hasil Google Maps).
   * Set ke 1.0 jika tidak ingin ada koreksi.
   */
  DISTANCE_BUFFER: 1.05,

  /**
   * Nomor WhatsApp tujuan (kurir/penerima) — sudah di-set permanen.
   * Ubah jika nomor berubah.
   */
  WA_NUMBER: '6289507785333',
};
/* ================================================================ */

/* ── INIT PETA ── */
const map = L.map('map', { center: [-6.2088, 106.8456], zoom: 12, zoomControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

/* ── STATE ── */
let stops = [];
let markers = [];
let routeLayer = null;
let stopIdCounter = 0;
let activeInputIndex = null;
let lastDistance = 0;
let lastCost = 0;

const COLORS = { origin: '#1a73e8', stop: '#4285f4', dest: '#ea4335' };

/* ── HELPERS ── */
function fmtRp(n) { return 'Rp ' + n.toLocaleString('id-ID'); }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escQ(s)  { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

/* ── RENDER ── */
function renderStops() {
  const list = document.getElementById('stops-list');
  list.innerHTML = '';
  const total = stops.length;

  stops.forEach((stop, i) => {
    const isFirst = i === 0, isLast = i === total - 1, canDel = total > 2;
    const pinClass  = isFirst ? 'origin' : isLast ? 'dest' : 'stop';
    const pinLetter = isFirst ? 'A' : isLast ? String.fromCharCode(64 + total) : String.fromCharCode(65 + i);
    const ph = isFirst ? 'Cari lokasi atau paste link Google Maps...' : isLast ? 'Cari tujuan atau paste link Google Maps...' : `Titik pemberhentian ${i}...`;
    const hasVal = !!(stop.label);

    const div = document.createElement('div');
    div.className = 'stop-item';
    div.innerHTML = `
      <div class="stop-pin ${pinClass}">${pinLetter}</div>
      <div class="ac-wrap">
        <input class="stop-input" id="inp-${i}" placeholder="${ph}"
          value="${esc(stop.label || '')}" autocomplete="off" />
        <button class="btn-clear${hasVal ? ' show' : ''}" id="clr-${i}" title="Hapus isian">
          <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
          </svg>
        </button>
        <div class="ac-list" id="ac-${i}"></div>
      </div>
      <button class="btn-icon" title="Gunakan GPS saya" onclick="useGPS(${i})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
      </button>
      ${canDel ? `
      <button class="btn-icon danger" title="Hapus titik ini" onclick="removeStop(${i})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
        </svg>
      </button>` : ''}
    `;
    list.appendChild(div);

    if (i < total - 1) {
      const c = document.createElement('div');
      c.className = 'stop-connector';
      c.innerHTML = `<svg width="2" height="10" viewBox="0 0 2 10"><line x1="1" y1="0" x2="1" y2="10" stroke="#ccc" stroke-width="2" stroke-dasharray="3 2"/></svg>`;
      list.appendChild(c);
    }
  });

  // listeners
  stops.forEach((_, i) => {
    const inp = document.getElementById(`inp-${i}`);
    const clr = document.getElementById(`clr-${i}`);
    if (!inp) return;

    inp.addEventListener('focus', () => { activeInputIndex = i; });
    inp.addEventListener('blur',  () => setTimeout(() => closeAC(i), 150));
    inp.addEventListener('input', () => onInput(i));

    // Deteksi paste Google Maps URL secara instan
    inp.addEventListener('paste', e => {
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      if (isGoogleMapsUrl(pasted)) {
        e.preventDefault();
        inp.value = pasted;
        const clr = document.getElementById(`clr-${i}`);
        if (clr) clr.classList.add('show');
        resolveGoogleMapsLink(i, pasted);
      }
    });

    // FIX #2: tombol clear menggunakan mousedown + preventDefault
    // agar blur dari input tidak terjadi lebih dulu sebelum clear diproses
    if (clr) {
      clr.addEventListener('mousedown', e => {
        e.preventDefault();
        doClear(i);
      });
      // support touch
      clr.addEventListener('touchend', e => {
        e.preventDefault();
        doClear(i);
      });
    }
  });
}

function doClear(i) {
  if (markers[i]) { map.removeLayer(markers[i]); markers[i] = null; }
  stops[i].latlng = null;
  stops[i].label  = '';
  const inp = document.getElementById(`inp-${i}`);
  const clr = document.getElementById(`clr-${i}`);
  if (inp) { inp.value = ''; inp.focus(); }
  if (clr) clr.classList.remove('show');
  closeAC(i);
  clearRoute();
}

/* ── ADD / REMOVE ── */
function addStop() {
  stops.push({ id: stopIdCounter++, latlng: null, label: '' });
  renderStops();
  clearRoute();
  setTimeout(() => { const b = document.getElementById('sidebar-body'); b.scrollTop = b.scrollHeight; }, 60);
}

function removeStop(idx) {
  if (stops.length <= 2) return;
  if (markers[idx]) { map.removeLayer(markers[idx]); }
  markers.splice(idx, 1);
  stops.splice(idx, 1);
  renderStops();
  clearRoute();
}

/* ── AUTOCOMPLETE ── */
let acTimers = {};

function onInput(i) {
  const inp = document.getElementById(`inp-${i}`);
  const val = inp ? inp.value : '';
  stops[i].label = val;

  // toggle clear button
  const clr = document.getElementById(`clr-${i}`);
  if (clr) clr.classList.toggle('show', val.length > 0);

  if (!val) {
    if (markers[i]) { map.removeLayer(markers[i]); markers[i] = null; }
    stops[i].latlng = null;
    closeAC(i);
    return;
  }

  // ── Deteksi Google Maps URL yang di-paste / diketik ──
  if (isGoogleMapsUrl(val)) {
    closeAC(i);
    resolveGoogleMapsLink(i, val);
    return;
  }

  if (val.trim().length < 3) { closeAC(i); return; }

  clearTimeout(acTimers[i]);
  acTimers[i] = setTimeout(async () => {
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val.trim())}&limit=6&addressdetails=1`,
        { headers: { 'Accept-Language': 'id' } }
      );
      showAC(i, await r.json());
    } catch { closeAC(i); }
  }, 380);
}

function showAC(idx, results) {
  const box = document.getElementById(`ac-${idx}`);
  if (!box || !results.length) { closeAC(idx); return; }

  box.innerHTML = results.map(r => {
    const main = r.namedetails?.name || r.display_name.split(',')[0];
    const sub  = r.display_name.length > 60 ? r.display_name.substring(0, 60) + '…' : r.display_name;
    // FIX #1: gunakan onmousedown + e.preventDefault() agar blur tidak menutup list
    // sebelum nilai sempat disimpan ke state
    return `<div class="ac-item"
      onmousedown="handleAcSelect(event, ${idx}, ${r.lat}, ${r.lon}, '${escQ(r.display_name)}')"
      ontouchend="handleAcSelect(event, ${idx}, ${r.lat}, ${r.lon}, '${escQ(r.display_name)}')">
      <span class="ac-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </span>
      <span>
        <span class="ac-main">${esc(main)}</span>
        <span class="ac-sub">${esc(sub)}</span>
      </span>
    </div>`;
  }).join('');

  box.classList.add('open');
}

/* ── FIX #1: pakai mousedown/touchend + preventDefault ── */
function handleAcSelect(e, idx, lat, lng, name) {
  e.preventDefault(); // cegah blur dari input sebelum data tersimpan
  selectPlace(idx, parseFloat(lat), parseFloat(lng), name);
}

function selectPlace(idx, lat, lng, name) {
  const latlng = { lat, lng };
  stops[idx].latlng = latlng;
  stops[idx].label  = name;

  const inp = document.getElementById(`inp-${idx}`);
  const clr = document.getElementById(`clr-${idx}`);
  if (inp) inp.value = name;

  placeMarker(idx, latlng);
  map.setView([lat, lng], 14, { animate: true });
  clearRoute();
  showToast('Lokasi dipilih ✓');
}

function closeAC(i) {
  const b = document.getElementById(`ac-${i}`);
  if (b) { b.innerHTML = ''; b.classList.remove('open'); }

/* ── GPS ── */
function useGPS(idx) {
  if (!navigator.geolocation) { showToast('Browser tidak mendukung GPS'); return; }
  showToast('Mengambil lokasi GPS…');
  navigator.geolocation.getCurrentPosition(async pos => {
    const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    stops[idx].latlng = latlng;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&addressdetails=1&lat=${latlng.lat}&lon=${latlng.lng}`, { headers: { 'Accept-Language': 'id' } });
      const d = await r.json();
      stops[idx].label = d.display_name || `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    } catch { stops[idx].label = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`; }
    const inp = document.getElementById(`inp-${idx}`);
    const clr = document.getElementById(`clr-${idx}`);
    if (inp) inp.value = stops[idx].label;
    if (clr) clr.classList.add('show');
    placeMarker(idx, latlng);
    map.setView([latlng.lat, latlng.lng], 15, { animate: true });
    clearRoute();
    showToast('Lokasi GPS berhasil ✓');
  }, () => showToast('Gagal mendapatkan lokasi GPS'));
}

/* ── MARKERS ── */
function makeIcon(i) {
  const total  = stops.length;
  const color  = i === 0 ? COLORS.origin : i === total - 1 ? COLORS.dest : COLORS.stop;
  const letter = i === 0 ? 'A' : i === total - 1 ? String.fromCharCode(64 + total) : String.fromCharCode(65 + i);
  return L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;border-radius:50% 50% 50% 0;background:${color};border:3px solid #fff;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;">
      <span style="transform:rotate(45deg);color:#fff;font-size:10px;font-weight:700;font-family:sans-serif;">${letter}</span></div>`,
    iconSize: [30, 30], iconAnchor: [15, 30],
  });
}

function placeMarker(idx, latlng) {
  if (markers[idx]) map.removeLayer(markers[idx]);
  markers[idx] = L.marker([latlng.lat, latlng.lng], { icon: makeIcon(idx), draggable: true }).addTo(map);
  markers[idx].on('dragend', async ev => {
    const p = ev.target.getLatLng();
    stops[idx].latlng = { lat: p.lat, lng: p.lng };
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&addressdetails=1&lat=${p.lat}&lon=${p.lng}`, { headers: { 'Accept-Language': 'id' } });
      const d = await r.json();
      stops[idx].label = d.display_name || `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}`;
    } catch { stops[idx].label = `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}`; }
    const inp = document.getElementById(`inp-${idx}`);
    if (inp) inp.value = stops[idx].label;
    clearRoute();
    showToast('Marker digeser — hitung ulang untuk memperbarui rute');
  });
}

/* ── KALKULASI RUTE ── */
async function calculateRoute() {
  const filled = stops.filter(s => s.latlng);
  if (filled.length < 2)            { showToast('Minimal 2 lokasi harus diisi'); return; }
  if (filled.length < stops.length) { showToast('Ada lokasi yang belum dipilih'); return; }

  showLoading(true);
  clearRoute();

  const coords = stops.map(s => `${s.latlng.lng},${s.latlng.lat}`).join(';');
  try {
    const res  = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=false`);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes.length) {
      showToast('Rute tidak ditemukan. Coba lokasi lain.'); showLoading(false); return;
    }

    const distKm    = (data.routes[0].distance / 1000) * CONFIG.DISTANCE_BUFFER;
    const rawCost   = distKm * CONFIG.RATE_PER_KM;
    const finalCost = Math.ceil(Math.max(rawCost, CONFIG.MIN_COST) / 100) * 100;

    lastDistance = distKm;
    lastCost     = finalCost;

    routeLayer = L.geoJSON(data.routes[0].geometry, {
      style: { color: COLORS.origin, weight: 5, opacity: .85, lineJoin: 'round', lineCap: 'round' }
    }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [60, 60] });
    stops.forEach((s, i) => { if (s.latlng) placeMarker(i, s.latlng); });

    document.getElementById('res-distance').textContent = `${distKm.toFixed(2)} km`;
    document.getElementById('res-cost').textContent     = fmtRp(finalCost);
    document.getElementById('res-note').textContent     = `Tarif Rp ${CONFIG.RATE_PER_KM.toLocaleString('id-ID')}/km · ${stops.length} titik`;
    document.getElementById('result-card').classList.add('visible');
    document.getElementById('btn-wa').classList.add('visible');

    // Update tombol toggle mobile dengan ringkasan hasil
    updateToggleBtn(false, distKm, finalCost);

    showToast(`Rute ditemukan: ${distKm.toFixed(2)} km ✓`);
  } catch (err) {
    console.error(err);
    showToast('Gagal menghitung rute. Periksa koneksi.');
  } finally {
    showLoading(false);
  }
}

/* ── RESET ── */
function resetAll() {
  markers.forEach(m => { if (m) map.removeLayer(m); });
  markers = [];
  clearRoute();
  stopIdCounter = 0;
  stops = [
    { id: stopIdCounter++, latlng: null, label: '' },
    { id: stopIdCounter++, latlng: null, label: '' },
  ];
  lastDistance = 0; lastCost = 0;
  renderStops();
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('btn-wa').classList.remove('visible');

}

  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('btn-wa').classList.remove('visible');

}

/* ── GOOGLE MAPS LINK RESOLVER ──────────────────────────────────────
   Mendukung semua format Google Maps:
   • https://maps.app.goo.gl/xxxxx          ← short link (perlu unshorten)
   • https://www.google.com/maps/dir/lat,lng/...
   • https://www.google.com/maps/@lat,lng,...
   • https://www.google.com/maps/place/.../@lat,lng,...
   • https://maps.google.com/?q=lat,lng
   • https://www.google.com/maps?q=lat,lng

   Strategi untuk short link (goo.gl): karena browser memblokir
   fetch redirect lintas-origin, kita pakai beberapa proxy CORS
   secara waterfall. Jika semua gagal, fallback ke pencarian
   nama tempat via Nominatim dari teks URL.
──────────────────────────────────────────────────────────────────── */
function isGoogleMapsUrl(str) {
  return /maps\.app\.goo\.gl|maps\.google\.com|google\.com\/maps/i.test(str.trim());
}

/**
 * Ekstrak koordinat dari URL Google Maps panjang.
 * Urutan prioritas:
 *  1. /dir/lat,lng/...       → koordinat titik asal rute
 *  2. @lat,lng               → viewport center
 *  3. ?q=lat,lng             → query koordinat
 *  4. ll=lat,lng             → legacy format
 */
function extractCoordsFromUrl(url) {
  const patterns = [
    /\/dir\/(-?\d+\.\d+),(-?\d+\.\d+)/,
    /[?&/@](-?\d{1,3}\.\d{4,}),(-?\d{1,3}\.\d{4,})/,
    /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,
    /ll=(-?\d+\.\d+),(-?\d+\.\d+)/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) {
      const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
      if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) return { lat, lng };
    }
  }
  return null;
}

/**
 * Ekstrak koordinat dari blok data= Google Maps.
 * Mendukung dua format:
 *   Format 1 (PC/desktop Chrome): !1d<lng>!2d<lat>
 *   Format 2 (mobile/Kiwi):       !3d<lat>!4d<lng>
 */
function extractDataCoords(url) {
  const dataMatch = url.match(/[?&/]data=([^?&#]+)/);
  if (!dataMatch) return [];

  const data = decodeURIComponent(dataMatch[1]);
  const coords = [];

  // Format 1 (PC): !1d<lng>!2d<lat>
  const re1 = /!1d(-?\d+\.\d+).*?!2d(-?\d+\.\d+)/g;
  let m;
  while ((m = re1.exec(data)) !== null) {
    const lng = parseFloat(m[1]), lat = parseFloat(m[2]);
    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180)
      coords.push({ lat, lng });
  }

  // Format 2 (mobile/Kiwi): !3d<lat>!4d<lng>
  if (!coords.length) {
    const re2 = /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/g;
    while ((m = re2.exec(data)) !== null) {
      const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
      if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180)
        coords.push({ lat, lng });
    }
  }

  return coords;
}

/**
 * Ekstrak semua waypoint dari URL Google Maps /dir/.
 * Koordinat diambil dari (urutan prioritas):
 *   1. Koordinat langsung di path /dir/lat,lng/
 *   2. data= block: !1d<lng>!2d<lat> (PC Chrome)
 *   3. data= block: !3d<lat>!4d<lng> (Kiwi/mobile Chrome)
 *
 * PENTING: viewport @lat,lng TIDAK digunakan — itu pusat kamera
 * yang mencakup seluruh rute, bukan koordinat tujuan.
 *
 * Jika tidak ada koordinat untuk suatu waypoint → { type:'name' }
 * → akan ditangani oleh resolveByName dengan Nominatim structured query.
 */
function extractDirWaypoints(url) {
  const dirMatch = url.match(/\/maps\/dir\/(.+?)(?:\/@|$)/);
  if (!dirMatch) return [];

  const cleanPath = dirMatch[1].split(/\/data=/)[0];
  const pathParts = cleanPath.split('/').filter(p => p && p.trim());

  // Parse setiap bagian path: bisa nama atau koordinat langsung
  const pathItems = pathParts.map(p => {
    const decoded = decodeURIComponent(p.replace(/\+/g, ' ')).trim();
    const coord = decoded.match(/^(-?\d+\.?\d*),\s*(-?\d+\.?\d*)$/);
    if (coord) {
      const lat = parseFloat(coord[1]);
      const lng = parseFloat(coord[2]);
      if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
        return { type: 'coords', lat, lng };
      }
    }
    if (decoded.length >= 2) return { type: 'name', name: decoded };
    return null;
  }).filter(Boolean);

  // Ambil SEMUA koordinat yang tersedia dari data= block (kedua format)
  const dataCoords = [];
  
  const dataMatch = url.match(/[?&/]data=([^?&#]+)/);
  if (dataMatch) {
    const data = decodeURIComponent(dataMatch[1]);
    
    // Format desktop: !1d<lng>!2d<lat>
    const re1 = /!1d(-?\d+\.\d+)!2d(-?\d+\.\d+)/g;
    let m;
    while ((m = re1.exec(data)) !== null) {
      const lng = parseFloat(m[1]);
      const lat = parseFloat(m[2]);
      if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
        dataCoords.push({ lat, lng });
      }
    }
    
    // Format mobile: !3d<lat>!4d<lng>
    const re2 = /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/g;
    while ((m = re2.exec(data)) !== null) {
      const lat = parseFloat(m[1]);
      const lng = parseFloat(m[2]);
      if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
        dataCoords.push({ lat, lng });
      }
    }
  }

  // Bangun hasil akhir
  const results = [];
  let coordIdx = 0;  // pointer ke dataCoords yang tersedia

  for (const item of pathItems) {
    if (item.type === 'coords') {
      results.push({ lat: item.lat, lng: item.lng });
    } else {
      // Waypoint berupa nama → coba ambil koordinat dari data= block jika ada
      if (coordIdx < dataCoords.length) {
        results.push({
          lat: dataCoords[coordIdx].lat,
          lng: dataCoords[coordIdx].lng,
          name: item.name
        });
        coordIdx++;
      } else {
        // Tidak ada koordinat cadangan → biarkan sebagai nama saja
        results.push({ type: 'name', name: item.name });
      }
    }
  }

  return results;
}
/**
 * Ekstrak nama tempat dari URL Google Maps untuk fallback Nominatim.
 * Contoh: /maps/place/Taman+Bermain+RW+12/...  → "Taman Bermain RW 12"
 */
function extractPlaceNameFromUrl(url) {
  const m = url.match(/\/maps\/(?:place|search)\/([^/@?]+)/);
  if (m) return decodeURIComponent(m[1].replace(/\+/g, ' '));
  const q = url.match(/[?&]q=([^&@]+)/);
  if (q) return decodeURIComponent(q[1].replace(/\+/g, ' '));
  return null;
}

/* unshortenUrl dihapus — semua proxy CORS diblokir dari GitHub Pages.
   Short link kini ditangani via showShortLinkHelper (buka tab baru). */

async function resolveGoogleMapsLink(idx, rawUrl) {
  const url = rawUrl.trim();

  // ── Langkah 1: URL panjang dengan /dir/ → isi SEMUA stop sekaligus ──
  if (/\/maps\/dir\//i.test(url)) {
    showToast('Memproses link Google Maps…');
    await applyDirWaypoints(idx, url);
    return;
  }

  // ── Langkah 2: URL panjang biasa → ekstrak satu koordinat ──
  const direct = extractCoordsFromUrl(url);
  if (direct) {
    showToast('Memproses link Google Maps…');
    await applyCoords(idx, direct.lat, direct.lng);
    return;
  }

  // ── Langkah 3: Short link (goo.gl) → tidak bisa di-resolve tanpa proxy ──
  // Semua proxy CORS diblokir dari GitHub Pages.
  // Solusi: buka short link di tab baru → user salin URL panjang → paste di sini.
  if (/maps\.app\.goo\.gl/i.test(url)) {
    showShortLinkHelper(idx, url);
    return;
  }

  // ── Langkah 4: Nama tempat di URL ──
  const placeName = extractPlaceNameFromUrl(url);
  if (placeName) { await resolveByName(idx, placeName); return; }

  showToast('Format URL Google Maps tidak dikenali.');
}

      <button id="slh-open" style="
        width:100%;padding:11px;background:#1a73e8;color:#fff;border:none;
        border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;
        cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;
      ">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Buka Link di Tab Baru
      </button>

      <textarea id="slh-paste" placeholder="Paste URL panjang dari address bar di sini…" style="
        width:100%;height:72px;padding:10px 12px;border:1.5px solid #e0e0e0;
        border-radius:9px;font-family:inherit;font-size:12.5px;resize:none;
        outline:none;transition:border-color .2s;box-sizing:border-box;
      "></textarea>

      <div style="display:flex;gap:8px;margin-top:10px;">
        <button id="slh-cancel" style="
          flex:1;padding:10px;background:#f8f9fa;color:#5f6368;border:none;
          border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
        ">Batal</button>
        <button id="slh-confirm" style="
          flex:2;padding:10px;background:#34a853;color:#fff;border:none;
          border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
        ">Proses URL →</button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);

  // Buka link otomatis setelah modal muncul
  setTimeout(() => window.open(shortUrl, '_blank'), 300);

  // Tombol buka manual
  document.getElementById('slh-open').onclick = () => window.open(shortUrl, '_blank');

  // Focus textarea
  setTimeout(() => document.getElementById('slh-paste')?.focus(), 400);

  // Textarea: border biru saat focus
  const ta = document.getElementById('slh-paste');
  ta.addEventListener('focus', () => { ta.style.borderColor = '#1a73e8'; });
  ta.addEventListener('blur',  () => { ta.style.borderColor = '#e0e0e0'; });

  // Jika user paste langsung di textarea → proses otomatis jika URL panjang
  ta.addEventListener('paste', e => {
    setTimeout(() => {
      const val = ta.value.trim();
      if (isGoogleMapsUrl(val) && !/maps\.app\.goo\.gl/i.test(val)) {
        modal.remove();
        // Reset input utama dengan URL panjang
        const inp = document.getElementById(`inp-${idx}`);
        if (inp) inp.value = val;
        resolveGoogleMapsLink(idx, val);
      }
    }, 50);
  });

  // Tombol proses
  document.getElementById('slh-confirm').onclick = () => {
    const val = ta.value.trim();
    if (!val) { ta.style.borderColor = '#ea4335'; ta.focus(); return; }
    if (/maps\.app\.goo\.gl/i.test(val)) {
      ta.style.borderColor = '#ea4335';
      ta.placeholder = '⚠️ Ini masih short link. Salin URL PANJANG dari address bar browser.';
      ta.value = '';
      return;
    }
    if (!isGoogleMapsUrl(val)) {
      ta.style.borderColor = '#ea4335';
      ta.placeholder = '⚠️ Bukan URL Google Maps yang valid.';
      ta.value = '';
      return;
    }
    modal.remove();
    const inp = document.getElementById(`inp-${idx}`);
    if (inp) inp.value = val;
    resolveGoogleMapsLink(idx, val);
  };

  // Enter di textarea → proses
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('slh-confirm').click();
    }
  });

  // Batal
  document.getElementById('slh-cancel').onclick = () => {
    modal.remove();
    const inp = document.getElementById(`inp-${idx}`);
    if (inp) { inp.value = ''; inp.focus(); }
  };

  // Klik backdrop
  modal.addEventListener('click', e => {
    if (e.target === modal) modal.remove();
  });
}

/**
 * Dari URL /maps/dir/, ekstrak semua waypoint dan isi stop-stop secara otomatis.
 * - Jika jumlah waypoint == jumlah stop yang ada → isi semua
 * - Jika lebih banyak waypoint → tambah stop baru otomatis
 * - Jika hanya 1 waypoint → isi stop idx saja
 * idx = indeks stop yang sedang aktif (jadi tahu titik mana yang memulai)
 */
async function applyDirWaypoints(startIdx, url) {
  const waypoints = extractDirWaypoints(url);

  if (!waypoints.length) {
    showToast('Tidak ada koordinat yang ditemukan di URL ini.');
    return;
  }

  if (waypoints.length === 1) {
    const wp = waypoints[0];
    if (wp.type === 'name') {
      await resolveByName(startIdx, wp.name, null);
    } else {
      await applyCoords(startIdx, wp.lat, wp.lng, wp.name || null);
    }
    return;
  }

  showToast(`Mengisi ${waypoints.length} lokasi…`);

  // Pastikan jumlah stops cukup
  while (stops.length < waypoints.length) {
    stops.push({ id: stopIdCounter++, latlng: null, label: '' });
  }
  renderStops();

  // Anchor = koordinat pertama yang diketahui, untuk viewbox resolveByName
  const anchorWp = waypoints.find(w => w.type !== 'name');
  const anchor   = anchorWp ? { lat: anchorWp.lat, lng: anchorWp.lng } : null;

  for (let i = 0; i < waypoints.length; i++) {
    const wp = waypoints[i];
    if (wp.type === 'name') {
      // Tidak ada koordinat — cari via Nominatim structured query + anchor viewbox
      await resolveByName(i, wp.name, anchor);
    } else {
      // Koordinat tersedia — pakai langsung, silent (tidak setView per-stop)
      const label = wp.name || `${wp.lat}, ${wp.lng}`;
      await applyCoords(i, wp.lat, wp.lng, label, true);
    }
    // Delay kecil antar request Nominatim (hanya relevan jika ada resolveByName)
    if (i < waypoints.length - 1) await sleep(300);
  }

  // Satu kali fitBounds setelah semua stop terisi
  const lls = stops.slice(0, waypoints.length)
    .filter(s => s.latlng)
    .map(s => [s.latlng.lat, s.latlng.lng]);
  if (lls.length >= 2) map.fitBounds(lls, { padding: [60, 60] });
  else if (lls.length === 1) map.setView(lls[0], 15);

  clearRoute();
  showToast(`${waypoints.length} lokasi berhasil diisi ✓`);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/** Cari lokasi via Nominatim berdasarkan nama tempat/alamat dari URL Google Maps.
 *  @param {number} idx        - indeks stop yang akan diisi
 *  @param {string} name       - nama/alamat lengkap dari path URL Google Maps
 *  @param {object} [anchor]   - {lat,lng} koordinat referensi (asal rute) untuk viewbox
 */
async function resolveByName(idx, name, anchor) {
  // Nama dari path URL Google Maps sudah benar — gunakan langsung sebagai label
  // bahkan sebelum koordinat ditemukan
  const cleanName = name.replace(/\s+/g, ' ').trim();

  // Pre-fill input dengan nama dari Google Maps (pasti benar)
  // sehingga user bisa lihat dan koreksi jika perlu
  stops[idx].label = cleanName;
  const inp = document.getElementById(`inp-${idx}`);
  const clr = document.getElementById(`clr-${idx}`);
  if (inp) inp.value = cleanName;
  if (clr) clr.classList.add('show');

  showToast(`Mencari koordinat lokasi…`);

  // Viewbox ±0.15° dari anchor (~16km) — cegah Nominatim cari di kota lain
  const vb = anchor
    ? `&viewbox=${anchor.lng-0.15},${anchor.lat+0.15},${anchor.lng+0.15},${anchor.lat-0.15}&bounded=1`
    : '';
  const vbLoose = anchor
    ? `&viewbox=${anchor.lng-0.3},${anchor.lat+0.3},${anchor.lng+0.3},${anchor.lat-0.3}`
    : '';

  // Parse komponen alamat dari nama Google Maps untuk structured query
  // Format: "Jalan X, Kelurahan Y, Kec. Z, Kota W, Provinsi P, Indonesia"
  const parts = cleanName.split(',').map(s => s.trim()).filter(Boolean);
  const street    = parts[0] || '';
  // Cari komponen kota: biasanya ada "Kota X" atau "Kabupaten X"
  const cityPart  = parts.find(p => /kota|kabupaten/i.test(p)) || parts[parts.length - 3] || '';
  const city      = cityPart.replace(/^(kota|kabupaten)\s*/i, '').trim();
  const statePart = parts.find(p => /banten|jawa|jakarta|sulawesi|sumatera|kalimantan|bali/i.test(p)) || '';

  const structuredUrl = statePart
    ? `https://nominatim.openstreetmap.org/search?format=json&street=${encodeURIComponent(street)}&city=${encodeURIComponent(city)}&state=${encodeURIComponent(statePart)}&country=Indonesia&limit=3${vb}`
    : `https://nominatim.openstreetmap.org/search?format=json&street=${encodeURIComponent(street)}&city=${encodeURIComponent(city)}&country=Indonesia&limit=3${vb}`;

  async function tryFetch(url) {
    const r = await fetch(url, { headers: { 'Accept-Language': 'id' } });
    return r.json();
  }

  try {
    let d = [];

    // Coba 1: structured query (street + city + state) + viewbox
    if (street && city) {
      d = await tryFetch(structuredUrl);
    }

    // Coba 2: q= nama lengkap + viewbox
    if (!d.length) {
      d = await tryFetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanName)}&limit=3${vb}`
      );
    }

    // Coba 3: q= nama lengkap + viewbox lebih lebar
    if (!d.length && anchor) {
      d = await tryFetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanName)}&limit=3${vbLoose}`
      );
    }

    // Coba 4: street + city tanpa viewbox
    if (!d.length && street && city) {
      d = await tryFetch(
        `https://nominatim.openstreetmap.org/search?format=json&street=${encodeURIComponent(street)}&city=${encodeURIComponent(city)}&country=Indonesia&limit=3`
      );
    }

    // Coba 5: hanya nama jalan + kota (query sederhana) + viewbox
    if (!d.length && street) {
      d = await tryFetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(street + ', ' + city)}&limit=3${vb}`
      );
    }

    if (d.length) {
      const lat = parseFloat(d[0].lat), lng = parseFloat(d[0].lon);
      stops[idx].latlng = { lat, lng };
      // Pertahankan label dari Google Maps (lebih akurat dari Nominatim display_name)
      placeMarker(idx, { lat, lng });
      map.setView([lat, lng], 16, { animate: true });
      clearRoute();
    } else {
      // Koordinat tidak ditemukan tapi nama sudah ter-isi dari Google Maps
      // User bisa lihat nama yang benar dan geser pin secara manual
      stops[idx].latlng = null;
      showToast(`⚠️ Koordinat tidak ditemukan — nama sudah terisi, klik peta untuk pin lokasi`);
    }
  } catch {
    showToast('Gagal mencari lokasi. Periksa koneksi.');
  }
}

/**
 * Set koordinat + label untuk satu stop.
 * @param {number}  idx    - indeks stop
 * @param {number}  lat    - latitude
 * @param {number}  lng    - longitude
 * @param {string}  [label]  - label teks. Jika ada, pakai langsung (tanpa reverse geocode).
 *                             Jika null/undefined, reverse geocode via Nominatim.
 * @param {boolean} [silent] - jika true, tidak memanggil map.setView / toast
 *                             (dipakai saat mengisi banyak stop sekaligus)
 */
async function applyCoords(idx, lat, lng, label, silent) {
  const latlng = { lat, lng };
  stops[idx].latlng = latlng;

  if (label) {
    stops[idx].label = label;
  } else {
    // Reverse geocode — hanya untuk GPS / klik peta / drag marker
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&addressdetails=1&lat=${lat}&lon=${lng}`,
        { headers: { 'Accept-Language': 'id' } }
      );
      const d = await r.json();
      stops[idx].label = d.display_name || `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    } catch {
      stops[idx].label = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    }
  }

  const inp = document.getElementById(`inp-${idx}`);
  const clr = document.getElementById(`clr-${idx}`);
  if (inp) inp.value = stops[idx].label;
  if (clr) clr.classList.add('show');
  placeMarker(idx, latlng);

  if (!silent) {
    map.setView([lat, lng], 15, { animate: true });
    showToast('Lokasi berhasil diisi ✓');
  }
}

/* ── SIDEBAR MOBILE ── */
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  s.classList.toggle('open');
  updateToggleBtn(s.classList.contains('open'));
}

/**
 * Perbarui tampilan tombol toggle mobile.
 * - Saat sidebar terbuka  → "Tutup Panel"
 * - Saat sidebar tertutup & ada hasil → tampilkan ringkasan jarak + biaya
 * - Saat sidebar tertutup & belum ada hasil → "Buka Panel"
 */
function updateToggleBtn(isOpen, dist, cost) {
  const btn = document.getElementById('toggle-sidebar');
  if (!btn) return;

  const sidebar = document.getElementById('sidebar');
  const open = (isOpen !== undefined) ? isOpen : sidebar.classList.contains('open');

  if (open) {
    btn.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Tutup Panel`;
    btn.style.cssText = '';
    return;
  }

  const d = (dist !== undefined) ? dist : lastDistance;
  const c = (cost !== undefined) ? cost : lastCost;

  if (d > 0) {
    // Ada hasil kalkulasi — tampilkan ringkasan
    btn.style.borderRadius = '50px';
    btn.style.padding = '9px 18px 9px 14px';
    btn.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      <span style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.25;gap:0;">
        <span style="font-size:12.5px;font-weight:700;">Lihat Panel</span>
        <span style="font-size:10.5px;opacity:.88;font-weight:500;">${d.toFixed(2)} km &nbsp;·&nbsp; ${fmtRp(c)}</span>
      </span>`;
  } else {
    btn.style.cssText = '';
    btn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      Buka Panel`;
  }
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(v) { document.getElementById('loading-overlay').classList.toggle('show', v); }

/* ── INIT ── */
stops = [
  { id: stopIdCounter++, latlng: null, label: '' },
  { id: stopIdCounter++, latlng: null, label: '' },
];
renderStops();
</script>
