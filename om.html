<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator Jarak & Ongkir Kurir</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS VARIABLES & RESET
    ============================================================ */
    :root {
      --blue:        #1a73e8;
      --blue-dark:   #1557b0;
      --blue-light:  #e8f0fe;
      --blue-mid:    #4285f4;
      --red:         #ea4335;
      --green:       #34a853;
      --white:       #ffffff;
      --bg:          #f8f9fa;
      --border:      #e0e0e0;
      --text:        #202124;
      --text-sub:    #5f6368;
      --shadow-sm:   0 1px 4px rgba(0,0,0,.10);
      --shadow-md:   0 4px 16px rgba(0,0,0,.13);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.16);
      --radius:      14px;
      --font:        'Plus Jakarta Sans', sans-serif;
      --sidebar-w:   380px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    /* ============================================================
       LAYOUT
    ============================================================ */
    #app { display: flex; height: 100dvh; position: relative; }

    #map {
      flex: 1;
      height: 100%;
      z-index: 1;
    }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    #sidebar {
      position: absolute;
      top: 16px;
      left: 16px;
      width: var(--sidebar-w);
      max-height: calc(100dvh - 32px);
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .3s ease;
    }

    /* Header */
    .sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      flex-shrink: 0;
    }

    .sidebar-header .logo-icon {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 1px;
    }

    /* Scrollable body */
    .sidebar-body {
      padding: 16px 16px 8px;
      overflow-y: auto;
      flex: 1;
    }

    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ============================================================
       STOP ITEM
    ============================================================ */
    .stops-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

    .stop-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
    }

    .stop-item:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,115,232,.12);
      background: var(--white);
    }

    /* Pin dot */
    .stop-pin {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--white);
    }

    .stop-pin.origin  { background: var(--blue); }
    .stop-pin.stop    { background: var(--blue-mid); }
    .stop-pin.dest    { background: var(--red); }

    /* Input */
    .stop-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      min-width: 0;
    }

    .stop-input::placeholder { color: #aaa; }

    /* Autocomplete dropdown */
    .autocomplete-wrap { position: relative; flex: 1; min-width: 0; }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 6px);
      left: -42px;
      right: -52px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      z-index: 9999;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-list.open { display: block; }

    .autocomplete-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12.5px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--blue-light); }

    .autocomplete-item .ac-icon { color: var(--text-sub); flex-shrink: 0; margin-top: 1px; }
    .autocomplete-item .ac-main { font-weight: 600; display: block; }
    .autocomplete-item .ac-sub  { font-size: 11px; color: var(--text-sub); display: block; }

    /* GPS & Delete buttons */
    .btn-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub);
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }

    .btn-icon:hover { background: var(--blue-light); color: var(--blue); }
    .btn-icon.danger:hover { background: #fce8e6; color: var(--red); }

    /* Connector line */
    .stop-connector {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 16px;
      flex-shrink: 0;
    }

    .stop-connector svg { color: var(--border); }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn-add {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 9px;
      border: 1.5px dashed var(--blue);
      background: var(--blue-light);
      color: var(--blue);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-style .15s;
      margin-bottom: 14px;
    }

    .btn-add:hover { background: #d2e3fc; border-style: solid; }

    .btn-calc {
      width: 100%;
      padding: 12px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 14px;
    }

    .btn-calc:hover  { background: var(--blue-dark); }
    .btn-calc:active { transform: scale(.98); }

    .btn-reset {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      margin-bottom: 8px;
    }

    .btn-reset:hover { background: var(--bg); color: var(--text); }

    /* ============================================================
       RESULT CARD
    ============================================================ */
    #result-card {
      margin: 0 16px 16px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      border-radius: 12px;
      padding: 16px 18px;
      color: var(--white);
      display: none;
      flex-shrink: 0;
    }

    #result-card.visible { display: block; }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .result-row + .result-row {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      opacity: .8;
    }

    .result-value {
      font-size: 20px;
      font-weight: 700;
      text-align: right;
    }

    .result-value.big { font-size: 24px; }
    .result-note {
      font-size: 10.5px;
      opacity: .7;
      text-align: right;
      margin-top: 2px;
    }

    /* ============================================================
       LOADING SPINNER
    ============================================================ */
    #loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,.6);
      z-index: 9998;
      align-items: center;
      justify-content: center;
    }

    #loading-overlay.show { display: flex; }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       TOAST NOTIFICATION
    ============================================================ */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #303134;
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 9999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ============================================================
       MOBILE TOGGLE
    ============================================================ */
    #toggle-sidebar {
      display: none;
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      gap: 8px;
      align-items: center;
    }

    /* ============================================================
       LEAFLET CUSTOM MARKERS
    ============================================================ */
    .custom-marker-pin {
      width: 24px; height: 24px;
      border-radius: 50% 50% 50% 0;
      border: 3px solid var(--white);
      transform: rotate(-45deg);
      box-shadow: var(--shadow-md);
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      :root { --sidebar-w: calc(100vw - 24px); }

      #sidebar {
        top: auto;
        bottom: 80px;
        left: 12px;
        right: 12px;
        width: auto;
        max-height: 70dvh;
        transform: translateY(calc(100% + 96px));
      }

      #sidebar.open { transform: translateY(0); }

      #toggle-sidebar {
        display: flex;
      }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">
        <!-- Truck icon SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="1"/>
          <path d="M16 8h4l3 5v4h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div>
        <h1>Kalkulator Ongkir</h1>
        <p>Hitung jarak & biaya pengiriman</p>
      </div>
    </div>

    <div class="sidebar-body" id="sidebar-body">
      <div class="section-label">Rute Pengiriman</div>

      <!-- Stop list (dinamis) -->
      <div class="stops-list" id="stops-list"></div>

      <!-- Tombol tambah lokasi -->
      <button class="btn-add" id="btn-add-stop" onclick="addStop()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Tambah Lokasi
      </button>

      <!-- Tombol kalkulasi & reset -->
      <button class="btn-calc" onclick="calculateRoute()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Hitung Rute & Ongkir
      </button>

      <button class="btn-reset" onclick="resetAll()">Reset Semua</button>
    </div>

    <!-- Result card (di luar scrollable agar selalu kelihatan) -->
    <div id="result-card">
      <div class="result-row">
        <div>
          <div class="result-label">Total Jarak</div>
          <div class="result-value" id="res-distance">—</div>
        </div>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </div>
      <div class="result-row">
        <div>
          <div class="result-label">Total Ongkir</div>
          <div class="result-value big" id="res-cost">—</div>
          <div class="result-note" id="res-note">—</div>
        </div>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9 12h6M12 9v6"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Mobile toggle button -->
  <button id="toggle-sidebar" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
    Buka Panel
  </button>
</div>

<!-- Loading overlay -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ================================================================
   ⚙️  KONFIGURASI TARIF — UBAH DI SINI JIKA HARGA BERUBAH
================================================================ */
const CONFIG = {
  /**
   * Tarif biaya per kilometer (Rp)
   * Harga saat ini: Rp 3.000 / km
   * Jika harga bensin naik, cukup ubah angka di bawah ini.
   * Contoh: jika ingin Rp 3.500/km → ubah menjadi 3500
   */
  RATE_PER_KM: 3000,

  /**
   * Biaya minimum (Rp) — jika total lebih kecil, pakai nilai ini.
   * Set ke 0 jika tidak ada biaya minimum.
   */
  MIN_COST: 5000,
};
/* ================================================================ */

/* ================================================================
   INISIALISASI PETA
================================================================ */
const map = L.map('map', {
  center: [-6.2088, 106.8456],   // Jakarta sebagai default
  zoom: 12,
  zoomControl: false,
});

// CARTO Voyager tile — bersih, terang, mirip Google Maps
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }
).addTo(map);

// Pindahkan kontrol zoom ke kanan bawah
L.control.zoom({ position: 'bottomright' }).addTo(map);

/* ================================================================
   STATE
================================================================ */
let stops = [];          // Array of { id, latlng, label }
let markers = [];        // Leaflet markers
let routeLayer = null;   // Polyline layer
let stopIdCounter = 0;
let activeInputIndex = null;   // Input mana yang sedang aktif untuk klik peta

/* ================================================================
   HELPER: FORMAT RUPIAH
================================================================ */
function formatRupiah(num) {
  return 'Rp ' + num.toLocaleString('id-ID');
}

/* ================================================================
   HELPER: PIN COLOR
================================================================ */
function pinColor(idx, total) {
  if (idx === 0)          return CONFIG_COLORS.origin;
  if (idx === total - 1)  return CONFIG_COLORS.dest;
  return CONFIG_COLORS.stop;
}

const CONFIG_COLORS = {
  origin: '#1a73e8',
  stop:   '#4285f4',
  dest:   '#ea4335',
};

/* ================================================================
   RENDER STOPS
================================================================ */
function renderStops() {
  const list = document.getElementById('stops-list');
  list.innerHTML = '';

  stops.forEach((stop, i) => {
    const total = stops.length;
    const isFirst = i === 0;
    const isLast  = i === total - 1;
    const canDelete = total > 2;

    const labelText = isFirst ? 'Asal' : isLast ? 'Tujuan' : `Stop ${i}`;
    const pinClass  = isFirst ? 'origin' : isLast ? 'dest' : 'stop';
    const pinLetter = isFirst ? 'A' : isLast ? String.fromCharCode(64 + total) : String.fromCharCode(65 + i);

    const div = document.createElement('div');
    div.className = 'stop-item';
    div.setAttribute('data-index', i);

    div.innerHTML = `
      <div class="stop-pin ${pinClass}" title="${labelText}">${pinLetter}</div>
      <div class="autocomplete-wrap" style="position:relative;">
        <input
          class="stop-input"
          id="stop-input-${i}"
          placeholder="${labelText}..."
          value="${stop.label || ''}"
          autocomplete="off"
          data-index="${i}"
        />
        <div class="autocomplete-list" id="ac-${i}"></div>
      </div>
      <button class="btn-icon" title="Gunakan lokasi GPS saya" onclick="useGPS(${i})">
        <!-- GPS icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
      </button>
      ${canDelete ? `
      <button class="btn-icon danger" title="Hapus lokasi ini" onclick="removeStop(${i})">
        <!-- Close icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>` : ''}
    `;

    list.appendChild(div);

    // Connector dot between items
    if (i < total - 1) {
      const conn = document.createElement('div');
      conn.style.cssText = 'display:flex;align-items:center;justify-content:center;height:10px;padding-left:14px;';
      conn.innerHTML = `<svg width="3" height="10" viewBox="0 0 3 10"><line x1="1.5" y1="0" x2="1.5" y2="10" stroke="#ccc" stroke-width="2" stroke-dasharray="2 2"/></svg>`;
      list.appendChild(conn);
    }
  });

  // Attach input listeners
  stops.forEach((_, i) => {
    const inp = document.getElementById(`stop-input-${i}`);
    if (!inp) return;
    inp.addEventListener('input', () => onInputChange(i));
    inp.addEventListener('focus', () => { activeInputIndex = i; });
    inp.addEventListener('blur', () => {
      setTimeout(() => closeAutocomplete(i), 200);
    });
  });
}

/* ================================================================
   ADD / REMOVE STOP
================================================================ */
function addStop() {
  stops.push({ id: stopIdCounter++, latlng: null, label: '' });
  renderStops();
  clearRoute();
  // Scroll ke bawah
  setTimeout(() => {
    const body = document.getElementById('sidebar-body');
    body.scrollTop = body.scrollHeight;
  }, 50);
}

function removeStop(index) {
  if (stops.length <= 2) return;
  if (markers[index]) { map.removeLayer(markers[index]); }
  markers.splice(index, 1);
  stops.splice(index, 1);
  renderStops();
  clearRoute();
}

/* ================================================================
   AUTOCOMPLETE (Nominatim)
================================================================ */
let acTimers = {};

async function onInputChange(index) {
  const inp = document.getElementById(`stop-input-${index}`);
  const val = inp ? inp.value.trim() : '';
  stops[index].label = val;
  if (val.length < 3) { closeAutocomplete(index); return; }

  clearTimeout(acTimers[index]);
  acTimers[index] = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&limit=5&addressdetails=1`,
        { headers: { 'Accept-Language': 'id' } }
      );
      const data = await res.json();
      showAutocomplete(index, data);
    } catch { closeAutocomplete(index); }
  }, 350);
}

function showAutocomplete(index, results) {
  const box = document.getElementById(`ac-${index}`);
  if (!box) return;
  if (!results.length) { closeAutocomplete(index); return; }

  box.innerHTML = results.map((r, ri) => {
    const main = r.namedetails?.name || r.display_name.split(',')[0];
    const sub  = r.display_name.replace(main + ', ', '').substring(0, 60) + (r.display_name.length > 60 ? '…' : '');
    return `<div class="autocomplete-item" onclick="selectPlace(${index}, ${r.lat}, ${r.lon}, '${escapeSingle(r.display_name)}')">
      <span class="ac-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </span>
      <span><span class="ac-main">${escapeHTML(main)}</span><span class="ac-sub">${escapeHTML(sub)}</span></span>
    </div>`;
  }).join('');

  box.classList.add('open');
}

function closeAutocomplete(index) {
  const box = document.getElementById(`ac-${index}`);
  if (box) { box.innerHTML = ''; box.classList.remove('open'); }
}

function selectPlace(index, lat, lng, displayName) {
  const latlng = { lat: parseFloat(lat), lng: parseFloat(lng) };
  stops[index].latlng = latlng;
  stops[index].label  = displayName;
  const inp = document.getElementById(`stop-input-${index}`);
  if (inp) inp.value = displayName;
  closeAutocomplete(index);
  placeMarker(index, latlng);
  map.setView([latlng.lat, latlng.lng], 14, { animate: true });
  clearRoute();
}

/* ================================================================
   GPS LOCATION
================================================================ */
function useGPS(index) {
  if (!navigator.geolocation) { showToast('Browser tidak mendukung GPS'); return; }
  showToast('Mendapatkan lokasi GPS…');
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      stops[index].latlng = latlng;
      // Reverse geocode
      try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`, { headers: { 'Accept-Language': 'id' } });
        const data = await res.json();
        const label = data.display_name || `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
        stops[index].label = label;
        const inp = document.getElementById(`stop-input-${index}`);
        if (inp) inp.value = label;
      } catch {
        stops[index].label = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
      }
      placeMarker(index, latlng);
      map.setView([latlng.lat, latlng.lng], 15, { animate: true });
      clearRoute();
      showToast('Lokasi GPS berhasil diambil ✓');
    },
    () => showToast('Gagal mendapatkan lokasi GPS')
  );
}

/* ================================================================
   KLIK PETA → ISI INPUT AKTIF
================================================================ */
map.on('click', async (e) => {
  const idx = activeInputIndex;
  if (idx === null || idx === undefined) return;
  const latlng = { lat: e.latlng.lat, lng: e.latlng.lng };
  stops[idx].latlng = latlng;
  try {
    const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`, { headers: { 'Accept-Language': 'id' } });
    const data = await res.json();
    stops[idx].label = data.display_name || `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
  } catch {
    stops[idx].label = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
  }
  const inp = document.getElementById(`stop-input-${idx}`);
  if (inp) inp.value = stops[idx].label;
  placeMarker(idx, latlng);
  clearRoute();
  showToast('Lokasi dipilih dari peta ✓');
});

/* ================================================================
   MARKER MANAGEMENT
================================================================ */
function createMarkerIcon(index, total) {
  const color = index === 0 ? CONFIG_COLORS.origin : index === total - 1 ? CONFIG_COLORS.dest : CONFIG_COLORS.stop;
  const letter = index === 0 ? 'A' : index === total - 1 ? String.fromCharCode(64 + total) : String.fromCharCode(65 + index);
  return L.divIcon({
    className: '',
    html: `<div style="
      width:30px;height:30px;
      border-radius:50% 50% 50% 0;
      background:${color};
      border:3px solid white;
      transform:rotate(-45deg);
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      display:flex;align-items:center;justify-content:center;
    ">
      <span style="transform:rotate(45deg);color:white;font-size:11px;font-weight:700;font-family:var(--font);">${letter}</span>
    </div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 30],
  });
}

function placeMarker(index, latlng) {
  if (markers[index]) map.removeLayer(markers[index]);
  const icon = createMarkerIcon(index, stops.length);
  markers[index] = L.marker([latlng.lat, latlng.lng], { icon, draggable: true }).addTo(map);
  markers[index].on('dragend', async (e) => {
    const pos = e.target.getLatLng();
    stops[index].latlng = { lat: pos.lat, lng: pos.lng };
    try {
      const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`, { headers: { 'Accept-Language': 'id' } });
      const data = await res.json();
      stops[index].label = data.display_name || `${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}`;
    } catch {
      stops[index].label = `${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}`;
    }
    const inp = document.getElementById(`stop-input-${index}`);
    if (inp) inp.value = stops[index].label;
    clearRoute();
    showToast('Marker digeser, kalkulasi ulang untuk memperbarui rute');
  });
}

/* ================================================================
   ROUTE CALCULATION (OSRM)
================================================================ */
async function calculateRoute() {
  // Validasi: semua stop harus punya latlng
  const filled = stops.filter(s => s.latlng);
  if (filled.length < 2) {
    showToast('Minimal 2 lokasi harus dipilih terlebih dahulu');
    return;
  }
  if (filled.length < stops.length) {
    showToast('Beberapa lokasi belum dipilih. Klik peta atau cari lokasi.');
    return;
  }

  showLoading(true);
  clearRoute();

  // Bangun waypoint string: lon,lat;lon,lat;...
  const coords = stops.map(s => `${s.latlng.lng},${s.latlng.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=false`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes.length) {
      showToast('Rute tidak ditemukan. Coba lokasi lain.');
      showLoading(false);
      return;
    }

    const route = data.routes[0];
    const distanceM = route.distance;   // meter
    const distanceKm = distanceM / 1000;

    // Gambar polyline rute
    routeLayer = L.geoJSON(route.geometry, {
      style: { color: CONFIG_COLORS.origin, weight: 5, opacity: .85, lineJoin: 'round', lineCap: 'round' }
    }).addTo(map);

    // Fit bounds
    const bounds = routeLayer.getBounds();
    map.fitBounds(bounds, { padding: [60, 60] });

    // Refresh semua marker agar tampil di atas polyline
    stops.forEach((s, i) => { if (s.latlng) placeMarker(i, s.latlng); });

    // ==========================================================
    // KALKULASI BIAYA
    // ==========================================================
    const rawCost  = distanceKm * CONFIG.RATE_PER_KM;
    const finalCost = Math.max(rawCost, CONFIG.MIN_COST);
    const rounded   = Math.ceil(finalCost / 100) * 100; // bulatkan ke ratusan terdekat

    // Tampilkan hasil
    document.getElementById('res-distance').textContent = `${distanceKm.toFixed(2)} km`;
    document.getElementById('res-cost').textContent     = formatRupiah(rounded);
    document.getElementById('res-note').textContent     = `Tarif Rp ${CONFIG.RATE_PER_KM.toLocaleString('id-ID')}/km · ${stops.length} titik`;
    document.getElementById('result-card').classList.add('visible');

    showToast(`Rute ditemukan: ${distanceKm.toFixed(2)} km ✓`);
  } catch (err) {
    console.error(err);
    showToast('Gagal menghitung rute. Periksa koneksi internet.');
  } finally {
    showLoading(false);
  }
}

/* ================================================================
   RESET
================================================================ */
function resetAll() {
  // Hapus semua marker
  markers.forEach(m => { if (m) map.removeLayer(m); });
  markers = [];
  // Hapus rute
  clearRoute();
  // Reset stops ke 2 stop kosong
  stopIdCounter = 0;
  stops = [
    { id: stopIdCounter++, latlng: null, label: '' },
    { id: stopIdCounter++, latlng: null, label: '' },
  ];
  renderStops();
  document.getElementById('result-card').classList.remove('visible');
  showToast('Semua data direset');
}

function clearRoute() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  document.getElementById('result-card').classList.remove('visible');
}

/* ================================================================
   SIDEBAR MOBILE TOGGLE
================================================================ */
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const btn = document.getElementById('toggle-sidebar');
  s.classList.toggle('open');
  btn.innerHTML = s.classList.contains('open')
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Tutup Panel`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg> Buka Panel`;
}

/* ================================================================
   TOAST
================================================================ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ================================================================
   LOADING
================================================================ */
function showLoading(show) {
  document.getElementById('loading-overlay').classList.toggle('show', show);
}

/* ================================================================
   HELPERS
================================================================ */
function escapeHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeSingle(str) {
  return String(str).replace(/'/g, "\\'");
}

/* ================================================================
   INIT
================================================================ */
stops = [
  { id: stopIdCounter++, latlng: null, label: '' },
  { id: stopIdCounter++, latlng: null, label: '' },
];
renderStops();
</script>
